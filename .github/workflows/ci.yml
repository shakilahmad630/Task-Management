name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Start production server
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 15000
          curl -sf http://localhost:3000 > /dev/null && echo "Server OK"
          kill %1 2>/dev/null || true
